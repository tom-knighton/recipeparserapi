name: Trigger auto deployment for dev-sporkast-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ develop ]
    paths:
    - '**'
    - '.github/workflows/dev-sporkast-api-AutoDeployTrigger-002a903f-9727-453d-832b-0cf9b9da6a17.yml'

  # Allow manual trigger 
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.DEVSPORKASTAPI_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.DEVSPORKASTAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.DEVSPORKASTAPI_REGISTRY_PASSWORD }}
          containerAppName: dev-sporkast-api
          resourceGroup: rg-sporkast-dev
          imageToBuild: ghcr.io/tom-knighton/recipeparserapi:${{ github.sha }}
          
            

     




