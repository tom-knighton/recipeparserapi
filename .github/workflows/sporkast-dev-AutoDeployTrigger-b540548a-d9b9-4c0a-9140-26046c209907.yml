name: Trigger auto deployment for sporkast-dev

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/sporkast-dev-AutoDeployTrigger-b540548a-d9b9-4c0a-9140-26046c209907.yml'

  # Allow manual trigger 
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.SPORKASTDEV_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ca8c0a2889e7acr.azurecr.io
          registryUsername: ${{ secrets.SPORKASTDEV_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SPORKASTDEV_REGISTRY_PASSWORD }}
          containerAppName: sporkast-dev
          resourceGroup: rg-sporkast-dev
          imageToBuild: ca8c0a2889e7acr.azurecr.io/sporkast-dev:${{ github.sha }}
          
            

     

